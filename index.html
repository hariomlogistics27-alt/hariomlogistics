<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hari Om Logistics Tracking</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

.header{
background:#0b5ed7;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:450px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#0b5ed7;
}

input{
width:100%;
padding:14px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
background:#0b5ed7;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#084298;
}

#msg{
margin-top:15px;
text-align:center;
color:red;
font-weight:bold;
}
</style>
<body>

<div class="header">
  Hari Om Logistics
</div>

<div class="container">

  <h2>Track Your Shipment</h2>

  <input
    type="text"
    id="tracking"
    placeholder="Enter Tracking ID">

  <button onclick="trackShipment()">
    Track Shipment
  </button>

  <div id="msg"></div>

</div>

<script>

function trackShipment(){

var id=document.getElementById("tracking").value.trim().toUpperCase();

var tracking={

"HOL-105812497719":"https://hariomlogistics2753.blogspot.com/2026/07/mr-nilesh.html",

"HOL-10581247921":"https://hariomlogistics2753.blogspot.com/2026/07/mr-ashish.html"

};

if(tracking[id]){

window.location.href=tracking[id];

}else{

document.getElementById("msg").innerHTML="❌ Invalid Tracking ID";

}

}

</script>

</body>
</html>
