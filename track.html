<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipment Tracking</title>
</head>

<body>

<h2>Shipment Tracking</h2>

<div id="result">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW5vn_-Ql2r6N0DTl3t19EQRT3HLLCFxw",
  authDomain: "hari-om-logistics.firebaseapp.com",
  projectId: "hari-om-logistics",
  storageBucket: "hari-om-logistics.firebasestorage.app",
  messagingSenderId: "941223687085",
  appId: "1:941223687085:web:18bde39639e965d9372724"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const tracking = params.get("tracking");

if (!tracking) {
  document.getElementById("result").innerHTML = "<h3>No Tracking ID Found</h3>";
} else {

  try {

    const ref = doc(db, "Shipments", tracking);
    const snap = await getDoc(ref);

    alert("Tracking = " + tracking);
    alert("Path = " + ref.path);
    alert("Exists = " + snap.exists());

    if (snap.exists()) {

      const d = snap.data();

      document.getElementById("result").innerHTML = `
        <h2>Shipment Details</h2>

        <p><b>Tracking ID:</b> ${tracking}</p>
        <p><b>Status:</b> ${d.status}</p>
        <p><b>Sender:</b> ${d.sender}</p>
        <p><b>Receiver:</b> ${d.receiver}</p>
        <p><b>Origin:</b> ${d.origin}</p>
        <p><b>Destination:</b> ${d.destination}</p>
        <p><b>Current Location:</b> ${d.currentLocation}</p>
        <p><b>Booking Date:</b> ${d.bookingDate}</p>
        <p><b>Payment Status:</b> ${d.PaymentStatus}</p>
      `;

    } else {

      document.getElementById("result").innerHTML =
      "<h3>Tracking ID Not Found</h3>";

    }

  } catch (e) {

    document.getElementById("result").innerHTML =
    "<h3>Firebase Error</h3><p>" + e.message + "</p>";

  }

}

</script>

</body>
</html>
